<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitAnalyzer AI — Simplified</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fab fa-github"></i>
                <span>GitAnalyzer<span class="ai-tag">AI</span></span>
            </div>
            
            <nav class="nav-menu">
                <button class="nav-item active" data-view="chat-view">
                    <i class="fas fa-comment-dots"></i> <span>Chat</span>
                </button>
                <button class="nav-item" data-view="add-repo-view">
                    <i class="fas fa-plus-circle"></i> <span>Add Repo</span>
                </button>
            </nav>

            <div class="repo-history">
                <h3>Current Context</h3>
                <div id="active-repo-card" class="empty-context">
                    No repository loaded
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="reset-session-btn" class="footer-btn">
                    <i class="fas fa-rotate-left"></i> <span>Reset Session</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="view-title">
                    <h2 id="current-view-title">Chat Analysis</h2>
                </div>
                <div class="repo-stats" id="top-repo-stats" style="display: none;">
                    <span class="stat"><i class="fas fa-star"></i> <span id="stat-stars">0</span></span>
                    <span class="stat"><i class="fas fa-code-branch"></i> <span id="stat-forks">0</span></span>
                    <span class="language-pill" id="stat-lang">Python</span>
                </div>
            </header>

            <!-- Views Container -->
            <div class="view-container">
                
                <!-- Chat View -->
                <div id="chat-view" class="view active">
                    <div id="chat-messages" class="messages-container">
                        <div class="message system">
                            <div class="msg-content">
                                Hello! Please add a GitHub repository URL to begin the analysis.
                            </div>
                        </div>
                    </div>
                    
                    <div class="input-area">
                        <div class="input-wrapper">
                            <textarea id="chat-input" placeholder="Ask about structure, purpose, or loopholes..." rows="1" disabled></textarea>
                            <button id="send-btn" disabled>
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Add Repo View -->
                <div id="add-repo-view" class="view">
                    <div class="form-card">
                        <h2>Analyze Repository</h2>
                        <p>Enter a GitHub repository URL or "owner/repo" to start.</p>
                        <div class="input-group">
                            <label for="repo-url-input">GitHub Repository</label>
                            <input type="text" id="repo-url-input" placeholder="e.g. https://github.com/fastapi/fastapi">
                        </div>
                        <button id="analyze-repo-btn" class="primary-btn">
                            <i class="fas fa-bolt"></i> Start Analysis
                        </button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="overlay">
        <div class="loader-content">
            <div class="spinner"></div>
            <p id="loading-text">Analyzing repository architecture...</p>
            <span class="sub-text">Fetching file tree and key metadata</span>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
